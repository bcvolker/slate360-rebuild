# Codemagic CI/CD — builds the Capacitor native shells for Slate360 and ships
# them to TestFlight (iOS) and Google Play internal testing (Android).
#
# Slate360 is a Next.js app served from https://www.slate360.ai. The native
# shells (Capacitor) load that hosted app in a native WebView and add native
# capabilities (camera, and later ARKit/LiDAR depth). So CI does NOT build the
# web app — it only syncs Capacitor and compiles the native projects.
#
# One-time setup before the first run (see docs/native/README.md):
#   - Add @capacitor deps + run `npx cap add ios` / `npx cap add android` and
#     commit the generated ios/ and android/ folders.
#   - Create Codemagic env var groups referenced below with your signing creds.

workflows:
  ios-capacitor:
    name: Slate360 iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_connect # APP_STORE_CONNECT_PRIVATE_KEY, _KEY_IDENTIFIER, _ISSUER_ID
        - ios_signing # CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: "ai.slate360.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
    scripts:
      - name: Install JS dependencies
        # npm ci can hit transient registry ECONNRESET / network-aborted errors on
        # CI. Configure fetch retries and wrap the install in a backoff loop so a
        # flaky network blip retries instead of failing the whole build.
        script: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000
          for attempt in 1 2 3 4 5; do
            echo "npm ci attempt $attempt of 5"
            if npm ci; then echo "npm ci succeeded"; break; fi
            if [ "$attempt" = "5" ]; then echo "npm ci failed after 5 attempts"; exit 1; fi
            echo "retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
      - name: Capacitor sync (iOS)
        # Capacitor 8 uses Swift Package Manager — no CocoaPods / pod install.
        script: npx cap sync ios
      - name: Register native LiDAR capture files
        # Idempotently ensures the LiDAR plugin + native capture VC are in the
        # Xcode target's Compile Sources and the required frameworks are linked.
        script: |
          gem install xcodeproj --no-document
          ruby scripts/ios/add-lidar-plugin.rb
      - name: Set up code signing
        script: |
          # Decode the single-line base64 ASC API key into a real .p8 file
          # (avoids multi-line secure-var paste mangling in the Codemagic UI).
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 --decode > /tmp/asc_api_key.p8
          # Make the key available to later steps (build-number + publishing) via @file:.
          echo "APP_STORE_CONNECT_PRIVATE_KEY=@file:/tmp/asc_api_key.p8" >> $CM_ENV
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key @file:/tmp/asc_api_key.p8 \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0)
          cd ios/App
          agvtool new-version -all $(($LATEST + 1))
      - name: Stamp git commit into Info.plist
        # The capture HUD shows "b<build>·<sha>" so a stale TestFlight install is
        # identifiable in seconds (the recurring "fixes didn't take effect" trap).
        script: |
          SHA=$(echo "$CM_COMMIT" | cut -c1-7)
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :SlateBuildCommit string $SHA" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :SlateBuildCommit $SHA" "$PLIST"
          echo "Stamped SlateBuildCommit=$SHA"
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
      - name: Publish to TestFlight
        # Publish explicitly so --private-key points straight at the decoded .p8
        # file (the Codemagic `publishing` block passes @env: which doesn't
        # re-resolve our @file: indirection).
        script: |
          # Upload only. The build appears under TestFlight for INTERNAL testing
          # automatically. We deliberately do NOT pass --testflight (external beta
          # review submission) — that requires Beta App Review test info + export
          # compliance and would fail the step. Add it back once external testing
          # is set up in App Store Connect.
          app-store-connect publish \
            --path "build/ios/ipa/App.ipa" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key @file:/tmp/asc_api_key.p8
    artifacts:
      - build/ios/ipa/*.ipa

  android-capacitor:
    name: Slate360 Android (Play Internal)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      groups:
        - google_play # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - android_signing # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
      vars:
        PACKAGE_NAME: "ai.slate360.app"
      node: 22
      java: 17
    scripts:
      - name: Install JS dependencies
        # npm ci can hit transient registry ECONNRESET / network-aborted errors on
        # CI. Configure fetch retries and wrap the install in a backoff loop so a
        # flaky network blip retries instead of failing the whole build.
        script: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000
          for attempt in 1 2 3 4 5; do
            echo "npm ci attempt $attempt of 5"
            if npm ci; then echo "npm ci succeeded"; break; fi
            if [ "$attempt" = "5" ]; then echo "npm ci failed after 5 attempts"; exit 1; fi
            echo "retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
      - name: Capacitor sync (Android)
        script: npx cap sync android
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > android/app/keystore.jks
          cat >> android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Build release AAB
        script: cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
