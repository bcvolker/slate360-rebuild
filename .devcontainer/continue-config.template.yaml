name: Local Config
version: 1.0.0
schema: v1

models:
  - name: GPT-5.4
    provider: openai
    model: gpt-5.4
    apiKey: ${OPENAI_API_KEY}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 32000
      maxTokens: 4096

  - name: Claude Opus 4.6
    provider: anthropic
    model: claude-opus-4-6
    apiKey: ${ANTHROPIC_API_KEY}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 24000
      maxTokens: 2048

  - name: Claude Sonnet 4.6
    provider: anthropic
    model: claude-sonnet-4-6
    apiKey: ${ANTHROPIC_API_KEY}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 32000
      maxTokens: 2048

  - name: Gemini 3.1 Pro
    provider: gemini
    model: gemini-3.1-pro-preview
    apiKey: ${GEMINI_API_KEY}
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      contextLength: 32000
      maxTokens: 4096

  - name: Grok 4
