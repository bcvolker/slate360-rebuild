<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Light Mode Palette (Visible on white) -->
  <!-- Compass Legs:          #003A8C -->
  <!-- Compass Arc:           #1A5DFF -->
  <!-- Copper Pivot:          #D88A34 -->
  <!-- SLATE Text:            #0A1A2F -->
  <!-- 360 Text:              #005BEA -->

  <!-- COMPACT COMPASS ICON -->
  <g transform="translate(4,6)">
    <!-- Copper pivot -->
    <circle cx="18" cy="4.5" r="3.3" fill="#D88A34"></circle>

    <!-- Joint -->
    <circle cx="18" cy="16" r="3.6" fill="#003A8C"></circle>

    <!-- Left leg -->
    <path d="M18 16 L8 42" stroke="#003A8C" stroke-width="4.2" stroke-linecap="round"></path>

    <!-- Right leg -->
    <path d="M18 16 L28 42" stroke="#003A8C" stroke-width="4.2" stroke-linecap="round"></path>

    <!-- Curved crossbar -->
    <path d="M10 33 Q18 27 26 33" stroke="#1A5DFF" stroke-width="3" stroke-linecap="round"></path>
  </g>

  <!-- SINGLE WORD LOGO: SLATE360 -->
  <text x="60" y="42" font-family="Orbitron, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" letter-spacing="0.5">
    <tspan fill="#0A1A2F">SLATE</tspan>
    <tspan fill="#005BEA">360</tspan>
  </text>
</svg>
