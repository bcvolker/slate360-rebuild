<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Professional Level III thermographer insignia — Brian Volker.
       A personal professional mark (not a reproduction of any official ITC seal).
       Monochrome by design: inherits currentColor so it works over any surface;
       render with CSS `color` + `opacity` for the watermark treatment. -->
  <defs>
    <path id="arcTop" d="M 120 22 m -86 98 a 86 86 0 1 1 172 0" fill="none"/>
    <path id="arcBottom" d="M 34 120 a 86 86 0 0 0 172 0" fill="none"/>
  </defs>
  <g fill="none" stroke="currentColor">
    <circle cx="120" cy="120" r="112" stroke-width="3"/>
    <circle cx="120" cy="120" r="104" stroke-width="1"/>
    <circle cx="120" cy="120" r="70" stroke-width="1.5"/>
  </g>
  <g fill="currentColor" font-family="'IBM Plex Mono','Courier New',monospace" letter-spacing="2.5">
    <text font-size="14.5" font-weight="600">
      <textPath href="#arcTop" startOffset="50%" text-anchor="middle">BRIAN VOLKER · THERMOGRAPHY</textPath>
    </text>
    <text font-size="11.5">
      <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">ITC CERTIFIED · NO. 140957677</textPath>
    </text>
  </g>
  <!-- center mark -->
  <g fill="currentColor" text-anchor="middle" font-family="'IBM Plex Mono','Courier New',monospace">
    <text x="120" y="105" font-size="34" font-weight="700" letter-spacing="4">III</text>
    <text x="120" y="126" font-size="11" letter-spacing="3">LEVEL III</text>
    <text x="120" y="143" font-size="9.5" letter-spacing="2">INFRARED THERMOGRAPHER</text>
  </g>
  <!-- subtle crosshair ticks: thermography motif -->
  <g stroke="currentColor" stroke-width="1.5">
    <line x1="120" y1="54" x2="120" y2="64"/>
    <line x1="120" y1="176" x2="120" y2="186"/>
    <line x1="54" y1="120" x2="64" y2="120"/>
    <line x1="176" y1="120" x2="186" y2="120"/>
  </g>
</svg>
