<svg width="210" height="64" viewBox="0 0 210 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- COLORS -->
  <!-- White text:          #FFFFFF -->
  <!-- Blueprint Blue:      #1A5DFF -->
  <!-- Soft Blueprint Blue: #6BA8FF -->
  <!-- Copper Accent:       #F6A542 -->
  <!-- 360 Blue:            #2FB7FF -->

  <!-- COMPACT COMPASS ICON -->
  <g transform="translate(4,6)">
    <!-- Copper pivot -->
    <circle cx="18" cy="4.5" r="3.2" fill="#F6A542"></circle>

    <!-- Joint -->
    <circle cx="18" cy="16" r="3.6" fill="#1A5DFF"></circle>

    <!-- Left leg -->
    <path d="M18 16 L8 42" stroke="#1A5DFF" stroke-width="4.2" stroke-linecap="round"></path>

    <!-- Right leg -->
    <path d="M18 16 L28 42" stroke="#1A5DFF" stroke-width="4.2" stroke-linecap="round"></path>

    <!-- Curved crossbar -->
    <path d="M10 33 Q18 27 26 33" stroke="#6BA8FF" stroke-width="3" stroke-linecap="round"></path>
  </g>

  <!-- SINGLE WORD: SLATE360 -->
  <text x="60" y="42" font-family="Orbitron, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" letter-spacing="0.5">
    <tspan fill="#FFFFFF">SLATE</tspan>
    <tspan fill="#2FB7FF">360</tspan>
  </text>
</svg>
